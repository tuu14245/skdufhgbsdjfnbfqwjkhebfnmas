<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title></title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #141414;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }
    .container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      margin-bottom: 200px;
    }
    input {
      width: 100%;
      padding: 18px 20px;
      font-size: 18px;
      background: #000;
      color: #fff;
      border: 1px solid #333;
      border-radius: 8px;
      text-align: center;
      outline: none;
    }
    #frame-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      display: none;
      z-index: 100;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <input type="text" id="code" autocomplete="off" maxlength="30">
  </div>

  <div id="frame-container">
    <iframe is="x-frame-bypass" id="bypass-frame"></iframe>
  </div>

  <script src="https://unpkg.com/@ungap/custom-elements-builtin"></script>
  <script type="module" src="https://unpkg.com/x-frame-bypass"></script>

  <script>
    const mappings = {
      "001": "https://example.com",
      "002": "https://google.com",
      "003": "https://github.com",
    };

    function loadSite() {
      const input = document.getElementById('code').value.trim().toLowerCase();
      if (!input) return;

      const targetUrl = mappings[input];
      if (!targetUrl) {
        alert("Неверный код");
        return;
      }

      try {
        document.getElementById('bypass-frame').src = targetUrl;
        document.getElementById('frame-container').style.display = 'block';
      } catch(e) {}
    }

    document.getElementById('code').addEventListener('keypress', e => {
      if (e.key === 'Enter') loadSite();
    });

    window.onload = () => document.getElementById('code').focus();
  </script>
</body>
</html>
